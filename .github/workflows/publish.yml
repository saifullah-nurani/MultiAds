name: Publish to Maven Central

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode GPG Key
        run: |
          echo "${{ secrets.GPG_SECRET_KEY }}" | base64 --decode > secret.gpg

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToOSSRHRepository
        env:
          ossrhUsername: ${{ secrets.OSSRH_USERNAME }}
          ossrhPassword: ${{ secrets.OSSRH_PASSWORD }}
          signing.keyId: ${{ secrets.GPG_KEY_ID }}
          signing.password: ${{ secrets.GPG_PASSWORD }}
          signing.secretKeyRingFile: secret.gpg
